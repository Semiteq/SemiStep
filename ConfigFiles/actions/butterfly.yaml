# Butterfly valve control by pressure or position
900:
  ui_name: "Butterfly P"
  deploy_duration: immediate
  columns:
    - key: target_value
      default_value: "0"
      property_type_id: pressure_bar
    - key: step_duration
      default_value: "0"
      property_type_id: time
    - key: comment
      property_type_id: string

910:
  ui_name: "Butterfly %"
  deploy_duration: immediate
  columns:
    - key: target_value
      default_value: "0"
      property_type_id: percent
    - key: step_duration
      default_value: "0"
      property_type_id: time
    - key: comment
      property_type_id: string
